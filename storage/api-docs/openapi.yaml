openapi: 3.0.0
info:
  title: 'Goods Search API'
  description: 'HTTP API for product search with filters, sorting, pagination, queue-based indexing, and optional Redis caching.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost'
    description: 'Local development server'
paths:
  /api/products:
    get:
      tags:
        - Products
      summary: 'Search products'
      operationId: products.index
      parameters:
        -
          name: q
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
        -
          name: price_from
          in: query
          required: false
          schema:
            type: number
            format: float
            minimum: 0
        -
          name: price_to
          in: query
          required: false
          schema:
            type: number
            format: float
            minimum: 0
        -
          name: category_id
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        -
          name: in_stock
          in: query
          required: false
          schema:
            type: boolean
        -
          name: rating_from
          in: query
          required: false
          schema:
            type: number
            format: float
            maximum: 5
            minimum: 0
        -
          name: sort
          in: query
          required: false
          schema:
            type: string
            enum:
              - price_asc
              - price_desc
              - rating_desc
              - newest
        -
          name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        -
          name: per_page
          in: query
          required: false
          schema:
            type: integer
            default: 15
            maximum: 100
            minimum: 1
      responses:
        '200':
          description: 'Paginated product list'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPageResponse'
        '422':
          description: 'Validation error'
          content:
            application/json:
              schema:
                required:
                  - message
                  - errors
                properties:
                  message: { type: string, example: 'The given data was invalid.' }
                  errors: { type: object, additionalProperties: true }
                type: object
components:
  schemas:
    ProductPageResponse:
      required:
        - current_page
        - data
        - from
        - last_page
        - path
        - per_page
        - to
        - total
      properties:
        current_page:
          type: integer
          example: 1
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponse'
        from:
          type: integer
          example: 1
          nullable: true
        last_page:
          type: integer
          example: 10
        path:
          type: string
          example: 'http://localhost/api/products'
        per_page:
          type: integer
          example: 20
        to:
          type: integer
          example: 20
          nullable: true
        total:
          type: integer
          example: 200
      type: object
    ProductResponse:
      required:
        - id
        - name
        - price
        - category_id
        - in_stock
        - rating
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: 'Wireless Mouse Pro'
        price:
          type: string
          example: '149.99'
        category_id:
          type: integer
          example: 2
        in_stock:
          type: boolean
          example: true
        rating:
          type: number
          format: float
          example: 4.8
        created_at:
          type: string
          example: '2026-04-21T15:00:00+00:00'
          nullable: true
        updated_at:
          type: string
          example: '2026-04-21T15:00:00+00:00'
          nullable: true
      type: object
tags:
  -
    name: Products
    description: 'Product search endpoints'
