openapi: 3.0.0
info:
  title: 'Goods Search API'
  description: 'HTTP API for product search with filters, sorting, pagination, queue-based indexing, and optional Redis caching.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost'
    description: 'Local development server'
paths:
  /api/products:
    get:
      tags:
        - Products
      summary: 'Search products'
      operationId: products.index
      parameters:
        -
          $ref: '#/components/parameters/ProductsQuery'
        -
          $ref: '#/components/parameters/ProductsPriceFrom'
        -
          $ref: '#/components/parameters/ProductsPriceTo'
        -
          $ref: '#/components/parameters/ProductsCategoryId'
        -
          $ref: '#/components/parameters/ProductsInStock'
        -
          $ref: '#/components/parameters/ProductsRatingFrom'
        -
          $ref: '#/components/parameters/ProductsSort'
        -
          $ref: '#/components/parameters/ProductsPage'
        -
          $ref: '#/components/parameters/ProductsPerPage'
      responses:
        '200':
          description: 'Paginated product list'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPageResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
components:
  schemas:
    ProductPageResponse:
      required:
        - current_page
        - data
        - from
        - last_page
        - path
        - per_page
        - to
        - total
      properties:
        current_page:
          type: integer
          example: 1
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponse'
        from:
          type: integer
          example: 1
          nullable: true
        last_page:
          type: integer
          example: 10
        path:
          type: string
          example: 'http://localhost/api/products'
        per_page:
          type: integer
          example: 20
        to:
          type: integer
          example: 20
          nullable: true
        total:
          type: integer
          example: 200
      type: object
    ProductResponse:
      required:
        - id
        - name
        - price
        - category_id
        - in_stock
        - rating
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: 'Wireless Mouse Pro'
        price:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
          example: '149.99'
        category_id:
          type: integer
          example: 2
        in_stock:
          type: boolean
          example: true
        rating:
          type: number
          format: float
          example: 4.8
        created_at:
          type: string
          format: date-time
          example: '2026-04-21T15:00:00+00:00'
          nullable: true
        updated_at:
          type: string
          format: date-time
          example: '2026-04-21T15:00:00+00:00'
          nullable: true
      type: object
  responses:
    ValidationError:
      description: 'Validation error'
      content:
        application/json:
          schema:
            required:
              - message
              - errors
            properties:
              message:
                type: string
                example: 'The given data was invalid.'
              errors:
                type: object
                additionalProperties: true
            type: object
  parameters:
    ProductsQuery:
      name: q
      in: query
      required: false
      schema:
        type: string
        maxLength: 255
    ProductsPriceFrom:
      name: price_from
      in: query
      required: false
      schema:
        type: number
        format: float
        minimum: 0
    ProductsPriceTo:
      name: price_to
      in: query
      required: false
      schema:
        type: number
        format: float
        minimum: 0
    ProductsCategoryId:
      name: category_id
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    ProductsInStock:
      name: in_stock
      in: query
      required: false
      schema:
        type: boolean
    ProductsRatingFrom:
      name: rating_from
      in: query
      required: false
      schema:
        type: number
        format: float
        maximum: 5
        minimum: 0
    ProductsSort:
      name: sort
      in: query
      required: false
      schema:
        type: string
        enum:
          - price_asc
          - price_desc
          - rating_desc
          - newest
    ProductsPage:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
    ProductsPerPage:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        default: 15
        maximum: 100
        minimum: 1
tags:
  -
    name: Products
    description: 'Product search endpoints'
